{{#*inline "partials/page_header"}}
<div class="row">
    <div class="col-md-12">
        <h4 class="page-header" style="margin-bottom: 20px;">
            MinIO Dashboard
            <button class="btn btn-sm btn-default refresh-btn pull-right" title="Refresh">
                <i class="fa fa-refresh"></i> Refresh
            </button>
        </h4>
    </div>
</div>
{{/inline}}

<div class="animated fadeIn minio-dashboard">
    {{> partials/page_header}}

    <!-- Connection Status -->
    <div class="row">
        <div class="col-md-12">
            <div class="box box-primary">
                <div class="box-header with-border">
                    <h3 class="box-title">
                        <i class="fa fa-server"></i> Connection Status
                    </h3>
                    <div class="box-tools pull-right">
                        <button class="btn btn-sm btn-primary test-connection-btn">
                            <i class="fa fa-plug"></i> Test Connection
                        </button>
                    </div>
                </div>
                <div class="box-body">
                    <div class="connection-status">
                        <i class="fa connection-status-icon"></i>
                        <span class="connection-status-text">Checking...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Statistics -->
    <div class="row">
        <div class="col-md-12">
            <div class="box box-info">
                <div class="box-header with-border">
                    <h3 class="box-title">
                        <i class="fa fa-bar-chart"></i> Statistics
                    </h3>
                </div>
                <div class="box-body">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="info-box">
                                <span class="info-box-icon bg-aqua">
                                    <i class="fa fa-database"></i>
                                </span>
                                <div class="info-box-content">
                                    <span class="info-box-text">Total Buckets</span>
                                    <span class="info-box-number bucket-count">-</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="info-box">
                                <span class="info-box-icon bg-green">
                                    <i class="fa fa-file-o"></i>
                                </span>
                                <div class="info-box-content">
                                    <span class="info-box-text">Total Objects</span>
                                    <span class="info-box-number totalObjects">-</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="info-box">
                                <span class="info-box-icon bg-yellow">
                                    <i class="fa fa-hdd-o"></i>
                                </span>
                                <div class="info-box-content">
                                    <span class="info-box-text">Total Storage</span>
                                    <span class="info-box-number totalSize">-</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sync Status -->
    <div class="row">
        <div class="col-md-12">
            <div class="box box-success">
                <div class="box-header with-border">
                    <h3 class="box-title">
                        <i class="fa fa-refresh"></i> Sync Status
                    </h3>
                    <div class="box-tools pull-right">
                        <button class="btn btn-sm btn-success sync-now-btn">
                            <i class="fa fa-sync"></i> Sync Now
                        </button>
                    </div>
                </div>
                <div class="box-body">
                    <div class="sync-status">
                        <i class="fa sync-status-icon"></i>
                        <span class="sync-status-text">Checking...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Links -->
    <div class="row">
        <div class="col-md-12">
            <div class="box box-default">
                <div class="box-header with-border">
                    <h3 class="box-title">
                        <i class="fa fa-link"></i> Quick Links
                    </h3>
                </div>
                <div class="box-body">
                    <div class="row">
                        <div class="col-md-3">
                            <a href="#!/minio/buckets" class="btn btn-primary btn-block">
                                <i class="fa fa-database"></i> Browse Buckets
                            </a>
                        </div>
                        <div class="col-md-3">
                            <a href="#!/minio/objects" class="btn btn-info btn-block">
                                <i class="fa fa-file-o"></i> Browse Objects
                            </a>
                        </div>
                        <div class="col-md-3">
                            <a href="#!/minio/sync" class="btn btn-warning btn-block">
                                <i class="fa fa-refresh"></i> Sync Monitor
                            </a>
                        </div>
                        <div class="col-md-3">
                            <a href="#!/search?searchType=basic&query=minio" class="btn btn-default btn-block">
                                <i class="fa fa-search"></i> Search MinIO
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
